databaseChangeLog:
  - changeSet:
      id: 007-online-orders-leases
      author: trikonekt
      validCheckSum: ANY
      changes:
        - createTable:
            tableName: inventory_leases
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: product_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: quantity
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: order_id
                  type: BIGINT
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - createTable:
            tableName: online_orders
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: shop_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: delivery_address_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(32)
                  defaultValue: DRAFT
                  constraints:
                    nullable: false
              - column:
                  name: subtotal
                  type: numeric(12, 2)
                  constraints:
                    nullable: false
              - column:
                  name: delivery_fee
                  type: numeric(8, 2)
                  constraints:
                    nullable: false
              - column:
                  name: total
                  type: numeric(12, 2)
                  constraints:
                    nullable: false
              - column:
                  name: payment_method
                  type: VARCHAR(32)
                  defaultValue: COD
                  constraints:
                    nullable: false
              - column:
                  name: payment_status
                  type: VARCHAR(32)
                  defaultValue: PENDING
                  constraints:
                    nullable: false
              - column:
                  name: notes
                  type: VARCHAR(500)
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - createTable:
            tableName: online_order_items
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: order_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: product_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: quantity
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: numeric(12, 2)
                  constraints:
                    nullable: false
