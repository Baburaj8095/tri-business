databaseChangeLog:
  - changeSet:
      id: 014-b2b-online-orders
      author: cline
      validCheckSum: ANY
      changes:
        - createTable:
            tableName: b2b_online_orders
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: order_number
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: buyer_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: seller_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: shop_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(32)
                  defaultValue: PENDING_CONFIRMATION
                  constraints:
                    nullable: false
              - column:
                  name: payment_status
                  type: VARCHAR(32)
                  defaultValue: PENDING
                  constraints:
                    nullable: false
              - column:
                  name: payment_method
                  type: VARCHAR(32)
                  defaultValue: MANUAL
                  constraints:
                    nullable: false
              - column:
                  name: payment_ref_id
                  type: VARCHAR(128)
              - column:
                  name: subtotal
                  type: numeric(12, 2)
                  defaultValue: 0.00
                  constraints:
                    nullable: false
              - column:
                  name: total_mrp
                  type: numeric(12, 2)
                  defaultValue: 0.00
                  constraints:
                    nullable: false
              - column:
                  name: total_discount
                  type: numeric(12, 2)
                  defaultValue: 0.00
                  constraints:
                    nullable: false
              - column:
                  name: grand_total
                  type: numeric(12, 2)
                  defaultValue: 0.00
                  constraints:
                    nullable: false
              - column:
                  name: notes
                  type: VARCHAR(500)
              - column:
                  name: cancellation_reason
                  type: VARCHAR(255)
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - createTable:
            tableName: b2b_online_order_items
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: order_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: product_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: product_title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: quantity
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: numeric(12, 2)
                  constraints:
                    nullable: false
              - column:
                  name: mrp_at_purchase
                  type: numeric(12, 2)
                  defaultValue: 0.00
                  constraints:
                    nullable: false
              - column:
                  name: line_total
                  type: numeric(12, 2)
                  defaultValue: 0.00
                  constraints:
                    nullable: false

        - createTable:
            tableName: b2b_order_status_history
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: order_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: payment_status
                  type: VARCHAR(32)
              - column:
                  name: notes
                  type: TEXT
              - column:
                  name: changed_by
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: changed_by_user_id
                  type: BIGINT
              - column:
                  name: changed_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - createTable:
            tableName: b2b_order_payments
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: order_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: buyer_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: seller_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: shop_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: numeric(12, 2)
                  constraints:
                    nullable: false
              - column:
                  name: payment_method
                  type: VARCHAR(32)
                  defaultValue: MANUAL
                  constraints:
                    nullable: false
              - column:
                  name: reference
                  type: VARCHAR(128)
              - column:
                  name: notes
                  type: TEXT
              - column:
                  name: status
                  type: VARCHAR(32)
                  defaultValue: PENDING
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - createIndex:
            tableName: b2b_online_orders
            indexName: idx_b2b_online_orders_order_number
            unique: true
            columns:
              - column:
                  name: order_number

        - createIndex:
            tableName: b2b_online_orders
            indexName: idx_b2b_online_orders_buyer
            columns:
              - column:
                  name: buyer_id
              - column:
                  name: created_at

        - createIndex:
            tableName: b2b_online_orders
            indexName: idx_b2b_online_orders_seller
            columns:
              - column:
                  name: seller_id
              - column:
                  name: created_at

        - createIndex:
            tableName: b2b_online_order_items
            indexName: idx_b2b_online_order_items_order
            columns:
              - column:
                  name: order_id

        - createIndex:
            tableName: b2b_order_status_history
            indexName: idx_b2b_order_history_order
            columns:
              - column:
                  name: order_id
              - column:
                  name: changed_at

        - createIndex:
            tableName: b2b_order_payments
            indexName: idx_b2b_order_payments_order
            columns:
              - column:
                  name: order_id