server.port=8081
server.servlet.context-path=/api

# Database — reads from environment variables with fallback defaults
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/trikonekt}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true

# JWT
jwt.secret=${JWT_SECRET:trikonekt-captain-secret-key-must-be-256-bits-minimum-length-padded}
jwt.expiration.ms=86400000
jwt.refresh.expiration.ms=604800000

# Logging
logging.level.com.trikonekt=DEBUG
logging.level.org.springframework.jdbc=DEBUG

# Cloudinary Configuration (with safe fallbacks)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:demo-cloud}
cloudinary.api-key=${CLOUDINARY_API_KEY:demo-key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:demo-secret}

