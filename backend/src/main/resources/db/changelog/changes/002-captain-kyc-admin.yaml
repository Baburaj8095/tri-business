databaseChangeLog:
  - changeSet:
      id: 002-create-captain-kyc-and-admins
      author: trikonekt
      changes:
        - createTable:
            tableName: business_admins
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: username
                  type: VARCHAR(50)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
              - column:
                  name: role
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: modules
                  type: VARCHAR(255)
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: NOW()
              - column:
                  name: updated_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: NOW()

        - createTable:
            tableName: captain_kyc_details
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: dob
                  type: VARCHAR(20)
              - column:
                  name: gender
                  type: VARCHAR(20)
              - column:
                  name: address_line1
                  type: VARCHAR(255)
              - column:
                  name: address_line2
                  type: VARCHAR(255)
              - column:
                  name: city
                  type: VARCHAR(100)
              - column:
                  name: state_name
                  type: VARCHAR(100)
              - column:
                  name: pincode
                  type: VARCHAR(10)
              - column:
                  name: aadhaar_number
                  type: VARCHAR(20)
              - column:
                  name: pan_number
                  type: VARCHAR(20)
              - column:
                  name: aadhaar_front_url
                  type: VARCHAR(500)
              - column:
                  name: aadhaar_back_url
                  type: VARCHAR(500)
              - column:
                  name: pan_card_url
                  type: VARCHAR(500)
              - column:
                  name: selfie_url
                  type: VARCHAR(500)
              - column:
                  name: nominee_name
                  type: VARCHAR(150)
              - column:
                  name: nominee_relationship
                  type: VARCHAR(50)
              - column:
                  name: nominee_phone
                  type: VARCHAR(20)
              - column:
                  name: nominee_aadhaar
                  type: VARCHAR(20)
              - column:
                  name: nominee_dob
                  type: VARCHAR(20)
              - column:
                  name: bank_holder_name
                  type: VARCHAR(150)
              - column:
                  name: bank_name
                  type: VARCHAR(150)
              - column:
                  name: bank_account_number
                  type: VARCHAR(50)
              - column:
                  name: bank_ifsc
                  type: VARCHAR(20)
              - column:
                  name: bank_account_type
                  type: VARCHAR(20)
              - column:
                  name: kyc_status
                  type: VARCHAR(20)
                  defaultValue: PENDING
              - column:
                  name: kyc_rejection_reason
                  type: VARCHAR(500)
              - column:
                  name: verified_at
                  type: TIMESTAMPTZ
              - column:
                  name: verified_by
                  type: BIGINT
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: NOW()
              - column:
                  name: updated_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: NOW()

        # Seed initial super admin (username: admin, password: admin123, role: SUPER_ADMIN)
        # BCrypt hash of "admin123": $2a$10$83f2/9bZl/u18f5p8uJ6eexPz2oKkGgQ.5mF1x1m8P5d1YyK8iJtG
        - insert:
            tableName: business_admins
            columns:
              - column:
                  name: username
                  value: admin
              - column:
                  name: password
                  value: "$2a$10$.AkTk1dLgnwkL7wNdTZWmelhj99hMAgx4LBeEFXzTbxKTcgpDntSK"
              - column:
                  name: email
                  value: "admin@trikonekt.com"
              - column:
                  name: role
                  value: "SUPER_ADMIN"
              - column:
                  name: modules
                  value: "all"
