databaseChangeLog:
  - changeSet:
      id: 011-online-product-categories
      author: trikonekt
      validCheckSum: ANY
      changes:

        # Admin-curated online product category list (separate from business_merchantcategory which classifies shops)
        - createTable:
            tableName: online_product_categories
            columns:
              - column:
                  name: id
                  type: SERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: slug
                  type: VARCHAR(100)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: icon_name
                  type: VARCHAR(50)
                  defaultValue: 'category'
              - column:
                  name: color
                  type: VARCHAR(20)
                  defaultValue: '#0d9488'
              - column:
                  name: sort_order
                  type: INTEGER
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - createIndex:
            tableName: online_product_categories
            indexName: idx_opc_active_order
            columns:
              - column:
                  name: is_active
              - column:
                  name: sort_order
