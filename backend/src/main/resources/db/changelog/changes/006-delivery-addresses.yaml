databaseChangeLog:
  - changeSet:
      id: 006-delivery-addresses
      author: trikonekt
      validCheckSum: ANY
      changes:
        - createTable:
            tableName: user_delivery_addresses
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: recipients_name
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
              - column:
                  name: recipients_phone
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: address_line1
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: address_line2
                  type: VARCHAR(255)
              - column:
                  name: landmark
                  type: VARCHAR(150)
              - column:
                  name: city
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: state_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: pincode
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
              - column:
                  name: is_default
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
